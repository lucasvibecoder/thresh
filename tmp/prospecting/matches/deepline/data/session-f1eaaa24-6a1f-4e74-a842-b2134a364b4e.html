                return blocks.filter(b => typeof b === 'string').join('');
            }
            for (const b of blocks) {
                if (b && typeof b === 'object' && b.type === 'text') {
                    if (!b.text.startsWith('Base directory for this skill:')) return b.text;
                }
            }
        }
        if (!d.isSynthetic) {
            if (typeof rawContent === 'string' && rawContent) return rawContent;
            const blocks = asArray(rawContent);
            for (const b of blocks) {
                if (b && typeof b === 'object' && b.type === 'text') {
                    if (!b.text.startsWith('Base directory for this skill:')) return b.text;
                }
            }
        }
    }
    return null;
}

function mergeTranscriptAssistantMessages(events) {
    const merged = [];
    const pending = {};

    for (const d of events) {
        if (d.type !== 'assistant') {
            for (const k in pending) delete pending[k];
            merged.push(d);
            continue;
        }

        const msg = d.message || {};
        const mid = msg.id;
        let blocks = asArray(msg.content).filter(b => b && (b.type === 'text' || b.type === 'tool_use' || b.type === 'thinking'));
        if (!blocks.length) continue;

        if (mid && mid in pending) {
            const idx = pending[mid];
            merged[idx].message.content.push(...blocks);
            if (d.timestamp) merged[idx].timestamp = d.timestamp;
        } else {
            const newEvent = {
                type: 'assistant',
                timestamp: d.timestamp || null,
                message: {
                    model: msg.model || null,
                    id: mid,
                    content: blocks.slice(),
                },
            };
            pending[mid] = merged.length;
            merged.push(newEvent);
        }
    }
    return merged;
}

function parseIsoTs(tsStr) {
    if (!tsStr) return null;
    try {
        const d = new Date(tsStr);
        return isNaN(d.getTime()) ? null : d;
    } catch(e) { return null; }
}

function computeTranscriptDuration(events) {
    let firstTs = null, lastTs = null;
    for (const d of events) {
        const ts = parseIsoTs(d.timestamp);
        if (ts) {
            if (!firstTs) firstTs = ts;
            lastTs = ts;
        }
    }
    if (firstTs && lastTs) {
        return [(lastTs - firstTs) / 1000, firstTs];
    }
    return [0, null];
}

function toolCommandSummary(name, inp) {
    if (name === 'Bash') return inp.command || '';
    if (name === 'Read' || name === 'Write') return inp.file_path || inp.path || '';
    if (name === 'Edit') return inp.file_path || inp.path || '';
    if (name === 'Skill') return inp.skill || '';
    if (name === 'Grep') {
        const pat = inp.pattern || '';
        const path = inp.path || '';
        return 'pattern="' + pat + '"' + (path ? ' path=' + path : '');
    }
    if (name === 'Glob') return inp.pattern || '';
    if (name === 'Task') return inp.description || (inp.prompt || '').slice(0, 80);
    if (name === 'WebFetch') return inp.url || '';
    if (name === 'WebSearch') return inp.query || '';
    return JSON.stringify(inp).slice(0, 120);
}

function buildTimeline(events, firstTs) {
    const timeline = [];
    const resultsMap = {};
    for (const d of events) {
        if (d.type === 'user') {
            for (const b of asArray((d.message || {}).content)) {
                if (b && typeof b === 'object' && b.type === 'tool_result') {
                    const tid = b.tool_use_id || '';
                    let content = b.content || '';
                    if (Array.isArray(content)) {
                        content = content.filter(x => x && typeof x === 'object').map(x => x.text || '').join('\n');
                    }
                    resultsMap[tid] = {
                        is_error: !!b.is_error,
                        content: content,
                    };
                }
            }
        }
    }

    let step = 0;
    let eventIndex = 0;

    for (const d of events) {
        eventIndex++;
        if (d.type === 'user') {
            const isExternal = d.userType === 'external' || (!d.isSynthetic && !asArray((d.message || {}).content).some(b => b && typeof b === 'object' && b.type === 'tool_result'));
            if (isExternal) {
                const rawContent = (d.message || {}).content;
                let text = '';
                if (typeof rawContent === 'string') text = rawContent;
                else {
                    const blocks = asArray(rawContent);
                    text = blocks.filter(b => typeof b === 'string' || (b && b.type === 'text')).map(b => typeof b === 'string' ? b : b.text).join('\n');
                }
                text = text.trim();
                if (text && !text.startsWith('Base directory for this skill:')) {
                    let realElapsed = null;
                    if (firstTs && d.timestamp) {
                        const ts = parseIsoTs(d.timestamp);
                        if (ts) realElapsed = Math.round(((ts - firstTs) / 1000) * 10) / 10;
                    }
                    timeline.push({
                        kind: 'user_message',
                        text: text,
                        event_index: eventIndex,
                        elapsed: realElapsed,
                        repeat_count: d._repeat_count || null,
                    });
                }
            }
            continue;
        }
        if (d.type !== 'assistant') continue;
        const msg = d.message || {};
        const contentBlocks = asArray(msg.content);

        let realElapsed = null;
        if (firstTs && d.timestamp) {
            const ts = parseIsoTs(d.timestamp);
            if (ts) {
                realElapsed = Math.round(((ts - firstTs) / 1000) * 10) / 10;
            }
        }

        const textParts = [];
        const toolUses = [];
        const thinkingParts = [];
        for (const b of contentBlocks) {
            if (b.type === 'text') textParts.push(b.text);
            else if (b.type === 'tool_use') toolUses.push(b);
            else if (b.type === 'thinking') thinkingParts.push(b.thinking || '');
        }

        const combinedThinking = thinkingParts.join('\n').trim();
        if (combinedThinking) {
            timeline.push({
                kind: 'thinking',
                text: combinedThinking,
                event_index: eventIndex,
                elapsed: realElapsed,
                repeat_count: d._repeat_count || null,
            });
        }

        const combinedText = textParts.join('\n').trim();
        if (combinedText) {
            timeline.push({
                kind: 'reasoning',
                text: combinedText,
                event_index: eventIndex,
                elapsed: realElapsed,
                repeat_count: d._repeat_count || null,
            });
        }

        const parallel = toolUses.length > 1;
        for (const tu of toolUses) {
            step++;
            const tid = tu.id || '';
            const name = tu.name || '?';
            const inp = tu.input || {};
            const result = resultsMap[tid] || null;
            timeline.push({
                kind: 'tool_call',
                step: step,
                tool: name,
                command: toolCommandSummary(name, inp),
                input: inp,
                result_content: result ? result.content : null,
                is_error: result ? result.is_error : null,
                parallel: parallel,
                event_index: eventIndex,
                elapsed: realElapsed,
            });
        }
    }
    return timeline;
}

// ---------------------------------------------------------------------------
// Timeline analysis — loop detection, error streaks, deltas, file map
// ---------------------------------------------------------------------------

function annotateTimeline(timeline) {
    // Inter-step deltas
    for (let i = 1; i < timeline.length; i++) {
        if (timeline[i].elapsed != null && timeline[i - 1].elapsed != null) {
            timeline[i].delta_s = Math.round((timeline[i].elapsed - timeline[i - 1].elapsed) * 10) / 10;
        }
    }

    // Loop detection — consecutive identical tool+command
    let loopGroups = 0;
    for (let i = 0; i < timeline.length;) {
        if (timeline[i].kind !== 'tool_call') { i++; continue; }
        let j = i + 1;
        while (j < timeline.length && timeline[j].kind === 'tool_call'
            && timeline[j].tool === timeline[i].tool
            && timeline[j].command === timeline[i].command) j++;
        if (j - i > 1) {
            loopGroups++;
            for (let k = i; k < j; k++) {
                timeline[k].is_loop = true;
                timeline[k].loop_count = j - i;
            }
        }
        i = j;
    }

    // Error streak detection
    let maxErrorStreak = 0, errorStreakGroups = 0;
    for (let i = 0; i < timeline.length;) {
        if (timeline[i].kind !== 'tool_call' || !timeline[i].is_error) { i++; continue; }
        let j = i + 1;
        while (j < timeline.length && timeline[j].kind === 'tool_call' && timeline[j].is_error) j++;
        const len = j - i;
        if (len >= 2) {
            errorStreakGroups++;
            maxErrorStreak = Math.max(maxErrorStreak, len);
            for (let k = i; k < j; k++) timeline[k].error_streak_len = len;
        }
        i = j;
    }

    return { loopGroups, errorStreakGroups, maxErrorStreak };
}

function buildToolBreakdown(timeline) {
    const breakdown = {};
    for (const e of timeline) {
        if (e.kind === 'tool_call') breakdown[e.tool] = (breakdown[e.tool] || 0) + 1;
    }
    return breakdown;
}

function buildFileTouchMap(timeline) {
    const map = {};
    for (const e of timeline) {
        if (e.kind !== 'tool_call') continue;
        let fpath = null, op = null;
        if (e.tool === 'Read') { fpath = e.input.file_path || e.input.path; op = 'read'; }
        else if (e.tool === 'Write') { fpath = e.input.file_path || e.input.path; op = 'write'; }
        else if (e.tool === 'Edit') { fpath = e.input.file_path || e.input.path; op = 'edit'; }
        if (fpath) {
            if (!map[fpath]) map[fpath] = { read: 0, write: 0, edit: 0 };
            map[fpath][op]++;
        }
    }
    return map;
}

function processRawSession(raw) {
    const events = raw.events;
    const isTranscript = isTranscriptFormat(events);
    const prompt = extractPrompt(events);

    let processedEvents, meta, result, totalDurationS, firstTs, timeline, numTurns;

    if (isTranscript) {
        processedEvents = mergeTranscriptAssistantMessages(events);
        meta = extractSessionMetaTranscript(processedEvents);
        result = null;
        const [dur, fts] = computeTranscriptDuration(processedEvents);
        totalDurationS = Math.round(dur * 10) / 10;
        firstTs = fts;
        timeline = buildTimeline(processedEvents, firstTs);
        numTurns = 0;
        for (const d of processedEvents) {
            if (d.type === 'user') {
                const blocks = asArray((d.message || {}).content);
                if (blocks.some(b => b && typeof b === 'object' && b.type === 'text')) numTurns++;
            }
        }
    } else {
        processedEvents = events;
        meta = extractSessionMetaStream(events);
        result = extractResultStream(events);
        totalDurationS = Math.round(((result || {}).duration_ms || 0) / 100) / 10;
        firstTs = null;
        timeline = buildTimeline(events, null);
        numTurns = (result || {}).num_turns || null;
    }

    // Timing mode + proportional fallback
    const hasReal = timeline.some(e => e.elapsed != null);
    const totalEventCount = (isTranscript ? processedEvents : events).length;
    for (const entry of timeline) {
        if (entry.elapsed == null) {
            entry.elapsed = Math.round((entry.event_index / Math.max(1, totalEventCount)) * totalDurationS * 10) / 10;
        }
    }
    const timingMode = hasReal ? 'exact' : 'estimated';

    // Analysis passes
    const analysis = annotateTimeline(timeline);
    const toolBreakdown = buildToolBreakdown(timeline);
    const fileTouches = buildFileTouchMap(timeline);

    const toolCalls = timeline.filter(e => e.kind === 'tool_call').length;
    const toolErrors = timeline.filter(e => e.kind === 'tool_call' && e.is_error).length;

    return {
        label: raw.label,
        meta: meta,
        prompt: prompt,
        result: result,
        timeline: timeline,
        timing_mode: timingMode,
        stats: {
            duration_s: totalDurationS,
            tool_calls: toolCalls,
            tool_errors: toolErrors,
            num_turns: numTurns,
            cost_usd: (result || {}).total_cost_usd != null ? result.total_cost_usd : null,
            tool_breakdown: toolBreakdown,
            file_touches: fileTouches,
            loop_groups: analysis.loopGroups,
            error_streak_groups: analysis.errorStreakGroups,
            max_error_streak: analysis.maxErrorStreak,
        },
    };
}


// ---------------------------------------------------------------------------
// UI
// ---------------------------------------------------------------------------

const RAW_SESSIONS = JSON.parse(document.getElementById('raw-sessions').textContent);
let SESSIONS = [];
let currentSession = 0;
let filterErrors = false;
let isLive = false;
let liveIntervalId = null;

function saveViewerState() {
    const main = document.getElementById('main-content');
    const expandedDetails = [];
    document.querySelectorAll('.tool-detail.open').forEach(el => expandedDetails.push(el.id));
    const expandedText = [];
    document.querySelectorAll('.reasoning-toggle').forEach(toggle => {
        if (toggle.textContent === 'Show less') {
            const contentEl = toggle.previousElementSibling;
            if (contentEl && contentEl.id) expandedText.push(contentEl.id);
        }
    });
    const searchVal = (document.getElementById('search-input') || {}).value || '';
    sessionStorage.setItem('__viewer_state', JSON.stringify({
        session: currentSession,
        scrollTop: main ? main.scrollTop : 0,
        expandedDetails: expandedDetails,
        expandedText: expandedText,
        filterErrors: filterErrors,
        search: searchVal,
    }));
}

function restoreViewerState() {
    try {
        const raw = sessionStorage.getItem('__viewer_state');
        if (!raw) return null;
        return JSON.parse(raw);
    } catch(e) { return null; }
}

function toggleLive() {
    const badges = document.querySelectorAll('.live-badge');
    if (liveIntervalId) {
        clearInterval(liveIntervalId);
        liveIntervalId = null;
        badges.forEach(b => { b.textContent = 'PAUSED'; b.classList.add('paused'); });
    } else {
        liveIntervalId = setInterval(function() {
            saveViewerState();
            location.reload();
        }, 5000);
        badges.forEach(b => { b.textContent = 'LIVE'; b.classList.remove('paused'); });
    }
}

function init() {
    SESSIONS = RAW_SESSIONS.map(processRawSession);

    const saved = restoreViewerState();
    const initialSession = (saved && saved.session != null && saved.session < SESSIONS.length && saved.session >= -1) ? saved.session : 0;
    currentSession = initialSession;

    if (SESSIONS.length > 1) {
        document.getElementById('sidebar').classList.remove('hidden');
        renderSidebar();
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowDown' || e.key === 'j') {
                e.preventDefault();
                if (currentSession < SESSIONS.length - 1) switchSession(currentSession + 1);
            } else if (e.key === 'ArrowUp' || e.key === 'k') {
                e.preventDefault();
                if (currentSession > 0) switchSession(currentSession - 1);
            } else if (e.key === 'q' || e.key === 'Q') {
                switchToCompare();
            }
        });
    }

    if (initialSession === -1 && SESSIONS.length > 1) {
        renderComparison();
    } else {
        renderSession(Math.max(0, initialSession));
    }

    if (saved) {
        if (saved.filterErrors) {
            filterErrors = true;
            const btn = document.querySelector('.filter-btn');
            if (btn) btn.classList.add('active');
        }
        if (saved.search) {
            const inp = document.getElementById('search-input');
            if (inp) { inp.value = saved.search; applyFilter(); }
        }
        (saved.expandedText || []).forEach(id => {
            const el = document.getElementById(id);
            if (el && el.classList.contains('collapsed')) {
                el.classList.remove('collapsed');
                const toggle = el.nextElementSibling || el.parentElement.querySelector('.reasoning-toggle');
                if (toggle && toggle.classList.contains('reasoning-toggle')) toggle.textContent = 'Show less';
            }
        });
        (saved.expandedDetails || []).forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('open');
                const row = el.previousElementSibling;
                if (row) row.classList.add('expanded');
            }
        });
        const main = document.getElementById('main-content');
        if (main && saved.scrollTop) {
            main.scrollTop = saved.scrollTop;
        }
    }

    window.addEventListener('beforeunload', saveViewerState);

    // Replace <meta http-equiv="refresh"> with JS-based refresh to preserve state
    const metaRefresh = document.querySelector('meta[http-equiv="refresh"]');
    if (metaRefresh) {
        isLive = true;
        const interval = parseInt(metaRefresh.content, 10);
        metaRefresh.remove();
        if (interval > 0) {
            liveIntervalId = setInterval(function() {
                saveViewerState();
                location.reload();
            }, interval * 1000);
        }
    }
}

function renderSidebar() {
    const el = document.getElementById('sidebar');
    let html = '';
    if (SESSIONS.length > 1) {
        html += `<div class="sidebar-item sidebar-compare ${currentSession === -1 ? 'active' : ''}" onclick="switchToCompare()">
            <div class="label">Compare All</div>
            <div class="sub">${SESSIONS.length} sessions &middot; press <kbd>Q</kbd></div>
        </div>`;
    }
    html += SESSIONS.map((s, i) => {
        const errRate = s.stats.tool_calls > 0 ? Math.round(s.stats.tool_errors / s.stats.tool_calls * 100) : 0;
        return `<div class="sidebar-item ${i === currentSession ? 'active' : ''}" onclick="switchSession(${i})">
            <div class="label">${esc(s.label)}</div>
            <div class="sub">${s.stats.tool_calls} calls &middot; ${s.stats.tool_errors} err${errRate > 0 ? ' (' + errRate + '%)' : ''} &middot; ${formatDuration(s.stats.duration_s)}</div>
        </div>`;
    }).join('');
    el.innerHTML = html;
}

function switchSession(i) {
    currentSession = i;
    renderSidebar();
    renderSession(i);
}

function switchToCompare() {
    currentSession = -1;
    renderSidebar();
    renderComparison();
}

function downloadJsonl(i) {
    const raw = RAW_SESSIONS[i];
    const lines = raw.events.map(e => JSON.stringify(e));
    const blob = new Blob([lines.join('\n') + '\n'], {type: 'application/jsonl'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (raw.label || 'session') + '.jsonl';
    a.click();
    URL.revokeObjectURL(url);
}

function renderSession(i) {
    const s = SESSIONS[i];
    const main = document.getElementById('main-content');

    // Header
    const timingBadge = s.timing_mode === 'exact'
        ? '<span class="timing-badge exact">exact timestamps</span>'
        : '<span class="timing-badge estimated">estimated timestamps</span>';
    const liveBadge = isLive ? '<span class="live-badge" onclick="toggleLive()" title="Click to pause/resume auto-refresh">LIVE</span>' : '';
    let html = `<div class="header"><div class="header-title-row"><h1>${esc(s.label)}</h1>${timingBadge}${liveBadge}<button class="download-btn" onclick="downloadJsonl(${i})" title="Download raw JSONL">Download JSONL</button></div><div class="header-grid">`;
    html += item('Model', s.meta.model || '\u2014');
    html += item('Session', (s.meta.session_id || '\u2014').slice(0, 12));
    html += item('Duration', formatDuration(s.stats.duration_s));
    html += item('Turns', s.stats.num_turns || '\u2014');
    html += item('Tool Calls', s.stats.tool_calls);
    html += item('Errors', s.stats.tool_errors + (s.stats.tool_calls > 0 ? ' (' + Math.round(s.stats.tool_errors / s.stats.tool_calls * 100) + '%)' : ''));
    if (s.stats.cost_usd != null) html += item('Cost', '$' + s.stats.cost_usd.toFixed(2));
    if (s.stats.loop_groups > 0) html += item('Retry Loops', s.stats.loop_groups);
    if (s.stats.error_streak_groups > 0) html += item('Error Streaks', s.stats.error_streak_groups + ' (max ' + s.stats.max_error_streak + ')');
    html += '</div>';

    // Tool breakdown
    const tbEntries = Object.entries(s.stats.tool_breakdown).sort((a, b) => b[1] - a[1]);
    if (tbEntries.length > 0) {
        html += '<div class="tool-breakdown">';
        for (const [tool, count] of tbEntries) {
            const cls = tool.toLowerCase().replace(/[^a-z]/g, '');
            html += `<span class="tb-item"><span class="tool-name ${cls}">${esc(tool)}</span> <span class="tb-count">${count}</span></span>`;
        }
        html += '</div>';
    }
    html += '</div>';

    // Prompt
    if (s.prompt) {
        html += `<div class="prompt-card"><div class="prompt-label">PROMPT</div><div class="prompt-text">${esc(s.prompt)}</div></div>`;
    }

    // File touch map
    const fileEntries = Object.entries(s.stats.file_touches).sort((a, b) => {
        const ta = a[1].read + a[1].write + a[1].edit;
        const tb = b[1].read + b[1].write + b[1].edit;
        return tb - ta;
    });
    if (fileEntries.length > 0) {
        html += `<div class="file-map-card">
            <div class="file-map-header" onclick="toggleFileMap()">
                <span>Files Touched (${fileEntries.length})</span>
                <span class="file-map-toggle" id="file-map-toggle">Show</span>
            </div>
            <div class="file-map-body" id="file-map-body">
                <table class="file-map-table">
                    <thead><tr><th>File</th><th>Read</th><th>Write</th><th>Edit</th><th>Total</th></tr></thead>
                    <tbody>`;
        for (const [fpath, ops] of fileEntries) {
            const total = ops.read + ops.write + ops.edit;
            const parts = fpath.split('/');
            const shortPath = parts.length > 3 ? '\u2026/' + parts.slice(-3).join('/') : fpath;
            html += `<tr>
                <td title="${esc(fpath)}">${esc(shortPath)}</td>
                <td>${ops.read || '\u2014'}</td>
                <td>${ops.write || '\u2014'}</td>
                <td>${ops.edit || '\u2014'}</td>
                <td><strong>${total}</strong></td>
            </tr>`;
        }
        html += '</tbody></table></div></div>';
    }

    // Search + filter bar
    html += `<div class="search-bar">
        <input type="text" id="search-input" placeholder="Filter timeline (tool name, command, result text...)" oninput="applyFilter()">
        <button class="filter-btn ${filterErrors ? 'active' : ''}" onclick="toggleErrorFilter()">Errors Only</button>
    </div>`;

    // Timeline
    html += '<div class="timeline" id="timeline">';
    html += renderTimeline(s.timeline);
    html += '</div>';

    // Result card
    if (s.result) {
        const r = s.result;
        html += `<div class="result-card"><h3>Result${r.is_error ? ' (ERROR)' : ''}</h3>
            <div class="stat-row">
                ${stat('Duration', formatDuration(s.stats.duration_s))}
                ${r.duration_api_ms ? stat('API Duration', formatDuration(r.duration_api_ms / 1000)) : ''}
                ${stat('Turns', r.num_turns || '\u2014')}
                ${stat('Tool Calls', s.stats.tool_calls)}
                ${stat('Errors', s.stats.tool_errors)}
                ${r.total_cost_usd != null ? stat('Cost', '$' + r.total_cost_usd.toFixed(2)) : ''}
            </div>
            ${r.result_text ? `<div style="margin-top:14px;"><div style="color:var(--text-dim);font-size:12px;margin-bottom:6px;">FINAL OUTPUT</div><div class="md-rendered" style="background:var(--bg);border-radius:4px;padding:10px 14px;max-height:500px;overflow-y:auto;">${renderMarkdown(r.result_text)}</div></div>` : ''}
        </div>`;
    }

    main.innerHTML = html;
}

function renderComparison() {
    const main = document.getElementById('main-content');
    const liveBadge = isLive ? '<span class="live-badge" onclick="toggleLive()" title="Click to pause/resume auto-refresh">LIVE</span>' : '';
    let html = `<div class="header"><div class="header-title-row"><h1>Session Comparison</h1>${liveBadge}</div></div>`;

    html += '<div class="comparison-table-wrap"><table class="comparison-table">';
    html += '<thead><tr><th>Metric</th>';
    for (const s of SESSIONS) html += `<th>${esc(s.label)}</th>`;
    html += '</tr></thead><tbody>';

    // Duration
    html += compareRow('Duration', SESSIONS.map(s => formatDuration(s.stats.duration_s)), SESSIONS.map(s => s.stats.duration_s), 'lower');
    // Tool Calls
    html += compareRow('Tool Calls', SESSIONS.map(s => String(s.stats.tool_calls)), SESSIONS.map(s => s.stats.tool_calls), 'lower');
    // Errors
    html += '<tr><td>Errors</td>';
    for (const s of SESSIONS) {
        const rate = s.stats.tool_calls > 0 ? Math.round(s.stats.tool_errors / s.stats.tool_calls * 100) : 0;
        html += `<td>${s.stats.tool_errors} <span class="compare-dim">(${rate}%)</span></td>`;
    }
    html += '</tr>';
    // Cost
    const hasCost = SESSIONS.some(s => s.stats.cost_usd != null);
    if (hasCost) {
        html += compareRow('Cost', SESSIONS.map(s => s.stats.cost_usd != null ? '$' + s.stats.cost_usd.toFixed(2) : '\u2014'), SESSIONS.map(s => s.stats.cost_usd || 0), 'lower');
    }
    // Turns
    html += '<tr><td>Turns</td>';
    for (const s of SESSIONS) html += `<td>${s.stats.num_turns || '\u2014'}</td>`;
    html += '</tr>';
    // Files Touched
    html += '<tr><td>Files Touched</td>';
    for (const s of SESSIONS) html += `<td>${Object.keys(s.stats.file_touches).length}</td>`;
    html += '</tr>';
    // Retry Loops
    html += '<tr><td>Retry Loops</td>';
    for (const s of SESSIONS) html += `<td>${s.stats.loop_groups || 0}</td>`;
    html += '</tr>';
    // Error Streaks
    html += '<tr><td>Error Streaks</td>';
    for (const s of SESSIONS) {
        const val = s.stats.error_streak_groups || 0;
        const max = s.stats.max_error_streak || 0;
        html += `<td>${val}${max > 0 ? ' <span class="compare-dim">(max ' + max + ')</span>' : ''}</td>`;
    }
    html += '</tr>';

    // Tool breakdown section
    const allTools = {};
    for (const s of SESSIONS) {
        for (const t of Object.keys(s.stats.tool_breakdown)) allTools[t] = true;
    }
    const toolNames = Object.keys(allTools).sort();
    if (toolNames.length > 0) {
        html += `<tr class="compare-section"><td colspan="${SESSIONS.length + 1}">Tool Breakdown</td></tr>`;
        for (const tool of toolNames) {
            const cls = tool.toLowerCase().replace(/[^a-z]/g, '');
            html += `<tr><td class="compare-indent"><span class="tool-name ${cls}">${esc(tool)}</span></td>`;
            for (const s of SESSIONS) html += `<td>${(s.stats.tool_breakdown)[tool] || 0}</td>`;
            html += '</tr>';
        }
    }

    html += '</tbody></table></div>';
    main.innerHTML = html;
}

function compareRow(label, displayValues, numericValues, betterIs) {
    let bestIdx = -1, worstIdx = -1;
    if (numericValues.length > 1) {
        let bestVal = numericValues[0], worstVal = numericValues[0];
        bestIdx = 0; worstIdx = 0;
        for (let i = 1; i < numericValues.length; i++) {
            const v = numericValues[i];
            if (betterIs === 'lower') {
                if (v < bestVal) { bestVal = v; bestIdx = i; }
                if (v > worstVal) { worstVal = v; worstIdx = i; }
            } else {
                if (v > bestVal) { bestVal = v; bestIdx = i; }
                if (v < worstVal) { worstVal = v; worstIdx = i; }
            }
        }
        if (bestVal === worstVal) { bestIdx = -1; worstIdx = -1; }
    }
    let html = `<tr><td>${label}</td>`;
    for (let i = 0; i < displayValues.length; i++) {
        const cls = i === bestIdx ? ' class="compare-best"' : (i === worstIdx ? ' class="compare-worst"' : '');
        html += `<td${cls}>${displayValues[i]}</td>`;
    }
    html += '</tr>';
    return html;
}

function renderTimeline(timeline) {
    let html = '';

    for (let i = 0; i < timeline.length; i++) {
        const e = timeline[i];
        const id = 'entry-' + i;

        if (e.kind === 'user_message') {
            const long = e.text.length > 300;
            const repeatBadge = e.repeat_count ? `<span class="repeat-badge" title="This message repeated ${e.repeat_count} times and was collapsed">⟳ repeated ×${e.repeat_count}</span>` : '';
            html += `<div class="tl-entry tl-user" data-searchtext="${esc(e.text.toLowerCase())}">
                <div class="user-label">USER${repeatBadge}</div>
                <div class="user-message md-rendered ${long ? 'collapsed' : ''}" id="${id}">${renderMarkdown(e.text)}</div>
                ${long ? `<span class="reasoning-toggle" onclick="toggleReasoning('${id}', this)">Show more</span>` : ''}
            </div>`;
        } else if (e.kind === 'thinking') {
            const long = e.text.length > 300;
            const repeatBadge = e.repeat_count ? `<span class="repeat-badge" title="This message repeated ${e.repeat_count} times and was collapsed">⟳ repeated ×${e.repeat_count}</span>` : '';
            html += `<div class="tl-entry tl-thinking" data-searchtext="${esc(e.text.toLowerCase())}">
                <div class="thinking-label">THINKING${repeatBadge}</div>
                <div class="thinking md-rendered ${long ? 'collapsed' : ''}" id="${id}">${renderMarkdown(e.text)}</div>
                ${long ? `<span class="reasoning-toggle" onclick="toggleReasoning('${id}', this)">Show more</span>` : ''}
            </div>`;
        } else if (e.kind === 'reasoning') {
            const long = e.text.length > 300;
            const repeatBadge = e.repeat_count ? `<span class="repeat-badge" title="This message repeated ${e.repeat_count} times and was collapsed">⟳ repeated ×${e.repeat_count}</span>` : '';
            html += `<div class="tl-entry tl-reasoning" data-searchtext="${esc(e.text.toLowerCase())}">
                ${repeatBadge ? `<div class="reasoning-repeat-header">${repeatBadge}</div>` : ''}
                <div class="reasoning md-rendered ${long ? 'collapsed' : ''}" id="${id}">${renderMarkdown(e.text)}</div>
                ${long ? `<span class="reasoning-toggle" onclick="toggleReasoning('${id}', this)">Show more</span>` : ''}
            </div>`;
        } else if (e.kind === 'tool_call') {
            const statusClass = e.is_error === true ? 'fail' : (e.is_error === false ? 'ok' : 'unknown');
            const statusLabel = e.is_error === true ? 'FAIL' : (e.is_error === false ? 'OK' : '?');
            const toolClass = e.tool.toLowerCase().replace(/[^a-z]/g, '');
            const cmdDisplay = truncate(firstLine(e.command), 120);
            const searchContent = (e.tool + ' ' + e.command + ' ' + (e.result_content || '').slice(0, 500)).toLowerCase();

            // Gap indicator for large inter-step delays
            if (e.delta_s > 5) {
                html += `<div class="tl-gap"><span class="gap-line"></span><span class="gap-label">+${formatDuration(e.delta_s)}</span><span class="gap-line"></span></div>`;
            }

            const entryClasses = ['tl-entry', 'tl-tool'];
            if (e.is_error) entryClasses.push('is-error');
            if (e.error_streak_len) entryClasses.push('in-error-streak');
            if (e.is_loop) entryClasses.push('in-loop');

            html += `<div class="${entryClasses.join(' ')}" data-searchtext="${esc(searchContent)}">
                <div class="tool-row" onclick="toggleDetail('detail-${i}', this)">
                    <span class="tool-step">#${e.step}</span>
                    <span class="tool-elapsed">${formatElapsed(e.elapsed)}</span>
                    <span class="tool-status ${statusClass}">${statusLabel}</span>
                    <span class="tool-name ${toolClass}">${esc(e.tool)}</span>
                    <span class="tool-cmd">${esc(cmdDisplay)}</span>
                    ${e.parallel ? '<span class="parallel-badge">parallel</span>' : ''}
                    ${e.is_loop ? '<span class="loop-badge">loop \u00d7' + e.loop_count + '</span>' : ''}
                </div>
                <div class="tool-detail" id="detail-${i}">
                    <div class="tool-detail-section">
                        <div class="label">Input</div>
                        <pre>${esc(formatInput(e.tool, e.input))}</pre>
                    </div>
                    ${e.result_content != null ? `<div class="tool-detail-section">
                        <div class="label">Result</div>
                        <pre class="${e.is_error ? 'error-content' : ''}">${esc(truncate(e.result_content, 8000))}</pre>
                    </div>` : ''}
                </div>
            </div>`;
        }
    }
    return html;
}

function formatInput(tool, input) {
    if (tool === 'Bash') return input.command || JSON.stringify(input, null, 2);
    if (tool === 'Edit') {
        let s = 'file: ' + (input.file_path || input.path || '') + '\n\n';
        if (input.old_string != null) s += '--- old_string ---\n' + input.old_string + '\n\n';
        if (input.new_string != null) s += '+++ new_string +++\n' + input.new_string;
        return s;
    }
    return JSON.stringify(input, null, 2);
}

function toggleReasoning(id, toggle) {
    const el = document.getElementById(id);
    const collapsed = el.classList.toggle('collapsed');
    toggle.textContent = collapsed ? 'Show more' : 'Show less';
}

function toggleDetail(id, row) {
    const el = document.getElementById(id);
    const open = el.classList.toggle('open');
    row.classList.toggle('expanded', open);
}

function toggleFileMap() {
    const body = document.getElementById('file-map-body');
    const toggle = document.getElementById('file-map-toggle');
    const open = body.classList.toggle('open');
    toggle.textContent = open ? 'Hide' : 'Show';
}

function applyFilter() {
    const q = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('.tl-entry').forEach(el => {
        const text = el.getAttribute('data-searchtext') || '';
        const matchSearch = !q || text.includes(q);
        const matchError = !filterErrors || el.classList.contains('is-error');
        el.style.display = (matchSearch && matchError) ? '' : 'none';
    });
}

function toggleErrorFilter() {
    filterErrors = !filterErrors;
    document.querySelector('.filter-btn').classList.toggle('active', filterErrors);
    applyFilter();
}

function formatDuration(s) {
    if (s > 3600) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        return h + 'h ' + m + 'm';
    }
    if (s > 120) return Math.floor(s / 60) + 'm ' + Math.round(s % 60) + 's';
    return s + 's';
}
function formatElapsed(s) {
    if (s > 3600) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = Math.round(s % 60);
        return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
    }
    return s + 's';
}
function esc(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
}

function renderMarkdown(text) {
    if (!text) return '';
    const lines = text.split('\n');
    let html = '';
    let i = 0;

    while (i < lines.length) {
        const line = lines[i];

        // Fenced code blocks
        const fenceMatch = line.match(/^```(\w*)/);
        if (fenceMatch) {
            i++;
            const codeLines = [];
            while (i < lines.length && !lines[i].startsWith('```')) {
                codeLines.push(lines[i]);
                i++;
            }
            if (i < lines.length) i++;
            html += '<pre><code>' + esc(codeLines.join('\n')) + '</code></pre>';
            continue;
        }

        // Table: detect header row followed by separator row
        if (i + 1 < lines.length && /^\|(.+\|)+\s*$/.test(line.trim()) && /^\|[\s:|-]+\|\s*$/.test(lines[i+1].trim())) {
            const headerCells = line.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
            i += 2;
            let rows = '';
            while (i < lines.length && /^\|(.+\|)+\s*$/.test(lines[i].trim())) {
                const cells = lines[i].trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
                rows += '<tr>' + cells.map(c => '<td>' + inlineMarkdown(esc(c)) + '</td>').join('') + '</tr>';
                i++;
            }
            html += '<table><thead><tr>' + headerCells.map(c => '<th>' + inlineMarkdown(esc(c)) + '</th>').join('') + '</tr></thead><tbody>' + rows + '</tbody></table>';
            continue;
        }

        // Headers
        const hMatch = line.match(/^(#{1,3})\s+(.+)/);
        if (hMatch) {
            const level = hMatch[1].length;
            html += `<h${level}>${inlineMarkdown(esc(hMatch[2]))}</h${level}>`;
            i++; continue;
        }

        // Unordered list items
        if (/^[-*]\s+/.test(line.trim())) {
            html += '<ul>';
            while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
                html += '<li>' + inlineMarkdown(esc(lines[i].trim().replace(/^[-*]\s+/, ''))) + '</li>';
                i++;
            }
            html += '</ul>';
            continue;
        }

        // Ordered list items
        if (/^\d+\.\s+/.test(line.trim())) {
            html += '<ol>';
            while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
                html += '<li>' + inlineMarkdown(esc(lines[i].trim().replace(/^\d+\.\s+/, ''))) + '</li>';
                i++;
            }
            html += '</ol>';
            continue;
        }

        // Blank line
        if (!line.trim()) { i++; continue; }

        // Paragraph
        html += '<p>' + inlineMarkdown(esc(line)) + '</p>';
        i++;
    }
    return html;
}

function inlineMarkdown(s) {
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, text, url) {
        url = url.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
        return '<a href="' + url + '" target="_blank">' + text + '</a>';
    });
    s = s.replace(/ — /g, ' \u2014 ');
    return s;
}
function truncate(s, n) { return s.length > n ? s.slice(0, n - 3) + '...' : s; }
function firstLine(s) { return (s || '').split('\n')[0]; }
function item(k, v) { return `<div class="item"><div class="key">${k}</div><div class="val">${esc(String(v))}</div></div>`; }
function stat(k, v) { return `<div class="stat"><div class="key">${k}</div><div class="val">${esc(String(v))}</div></div>`; }

document.addEventListener('DOMContentLoaded', init);
</script>
