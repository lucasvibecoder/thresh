<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#080808">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23080808'/><text x='50' y='72' font-size='60' font-family='monospace' font-weight='bold' fill='%2300FF41' text-anchor='middle'>T_</text></svg>">
    <link rel="canonical" href="https://runthresh.com/playbooks/{{SLUG}}/">

    <meta property="og:type" content="article">
    <meta property="og:title" content="{{OG_TITLE}}">
    <meta property="og:description" content="{{OG_DESCRIPTION}}">
    <meta property="og:url" content="https://runthresh.com/playbooks/{{SLUG}}/">
    <meta property="og:image" content="https://runthresh.com/og-image.png">
    <meta property="og:site_name" content="Thresh">
    <meta property="article:published_time" content="{{ARTICLE_PUBLISHED}}">
    <meta property="article:modified_time" content="{{ARTICLE_MODIFIED}}">
    <meta property="article:author" content="Lucas Linares">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TWITTER_TITLE}}">
    <meta name="twitter:description" content="{{TWITTER_DESCRIPTION}}">
    <meta name="twitter:image" content="https://runthresh.com/og-image.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": "{{ARTICLE_HEADLINE}}",
      "description": "{{ARTICLE_DESCRIPTION}}",
      "datePublished": "{{ARTICLE_PUBLISHED}}",
      "dateModified": "{{ARTICLE_MODIFIED}}",
      "author": { "@type": "Person", "name": "Lucas Linares", "url": "https://runthresh.com" },
      "publisher": { "@type": "Organization", "name": "Thresh", "url": "https://runthresh.com" },
      "mainEntityOfPage": "https://runthresh.com/playbooks/{{SLUG}}/",
      "image": "https://runthresh.com/og-image.png"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"></noscript>
    <style>
        .nav-toggle-input{position:absolute;opacity:0;pointer-events:none}
        .nav-toggle{display:inline-flex;align-items:center;justify-content:center;padding:.5rem;color:#9CA1AA;cursor:pointer}
        .nav-toggle:hover{color:#00FF41}
        .nav-toggle svg{display:block}
        @media(max-width:767px){
            .nav-shell{flex-wrap:wrap}
            .nav-menu{display:none;width:100%;padding-top:.75rem;border-top:1px solid #242424;margin-top:.75rem}
            #nav-toggle:checked ~ .nav-menu{display:flex;flex-direction:column;gap:.5rem}
            .nav-menu a{display:block;padding:.5rem 0}
            .nav-menu .nav-cta{text-align:center;padding:.75rem 1rem}
            #nav-toggle:checked + .nav-toggle .nav-open{display:none}
            #nav-toggle:checked + .nav-toggle .nav-close{display:block}
            .nav-close{display:none}
        }
        @media(min-width:768px){
            .nav-toggle{display:none}
            .nav-menu{display:flex;align-items:center;gap:1.5rem}
        }
    </style>
    <link rel="stylesheet" href="{{CSS_PATH}}">
</head>

<body class="bg-brand-bg text-brand-text font-body antialiased">

    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[60] focus:bg-brand-accent focus:text-black focus:px-4 focus:py-2 focus:font-semibold focus:text-sm">Skip to content</a>

    <nav class="fixed top-0 left-0 right-0 z-50 border-b border-transparent">
        <div class="nav-shell max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="font-mono font-bold text-sm tracking-[0.2em] text-brand-accent hover:text-brand-accent-hover transition-colors">THRESH_</a>
            <input id="nav-toggle" class="nav-toggle-input" type="checkbox" aria-hidden="true">
            <label for="nav-toggle" class="nav-toggle md:hidden" aria-label="Toggle navigation menu">
                <svg class="nav-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                <svg class="nav-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </label>
            <div class="nav-menu md:flex items-center gap-6">
                <a href="/playbooks/" class="text-sm font-mono {{NAV_PLAYBOOKS_CLASS}} transition-colors py-2">Playbooks</a>
                <a href="/blog/" class="text-sm font-mono text-brand-muted hover:text-brand-accent transition-colors py-2">Blog</a>
                <a href="/#contact" class="nav-cta text-sm font-body font-semibold bg-brand-accent text-black px-5 py-2.5 hover:bg-brand-accent-hover btn-primary transition-all">Show Me the Signal</a>
            </div>
        </div>
    </nav>

    <main id="main-content" class="relative z-10">
